<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sensor Dashboard</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 1px solid #334155;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .status {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9em;
            background: #22c55e;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: #1e293b;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .card-title {
            font-size: 1.1em;
            font-weight: 600;
            margin-bottom: 15px;
            color: #94a3b8;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .battery-display {
            text-align: center;
            padding: 30px 0;
        }

        .battery-percent {
            font-size: 3em;
            font-weight: bold;
            color: #22c55e;
        }

        .battery-status {
            margin-top: 10px;
            color: #94a3b8;
        }

        .sensor-value {
            font-size: 2.5em;
            font-weight: bold;
            margin: 20px 0;
        }

        .sensor-label {
            color: #94a3b8;
            font-size: 0.9em;
        }

        .location-info {
            text-align: center;
            padding: 20px 0;
        }

        .chart-container {
            position: relative;
            height: 200px;
            margin-top: 20px;
        }

        .events-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .event-item {
            padding: 10px;
            border-bottom: 1px solid #334155;
            font-size: 0.9em;
        }

        .event-time {
            color: #94a3b8;
            font-size: 0.8em;
        }

        .refresh-btn {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9em;
        }

        .refresh-btn:hover {
            background: #2563eb;
        }

        .connection-status {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 0.9em;
        }

        .connected {
            background: #22c55e;
        }

        .disconnected {
            background: #ef4444;
        }

        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📱 Sensor Dashboard</h1>
            <span class="status" id="status">Loading...</span>
        </header>

        <div class="grid">
            <!-- Battery Card -->
            <div class="card">
                <div class="card-title">
                    🔋 Battery
                    <button class="refresh-btn" onclick="loadBattery()">Refresh</button>
                </div>
                <div class="battery-display">
                    <div class="battery-percent" id="battery-percent">--%</div>
                    <div class="battery-status" id="battery-status">Loading...</div>
                </div>
                <canvas id="batteryChart"></canvas>
            </div>

            <!-- Light Sensor -->
            <div class="card">
                <div class="card-title">
                    💡 Light
                    <span class="sensor-label">Lux</span>
                </div>
                <div class="sensor-value" id="light-value">--</div>
                <canvas id="lightChart"></canvas>
            </div>

            <!-- Accelerometer -->
            <div class="card">
                <div class="card-title">
                    📱 Accelerometer
                    <span class="sensor-label">m/s²</span>
                </div>
                <div class="sensor-value" id="accel-value">--</div>
                <div style="display: flex; gap: 20px; justify-content: center;">
                    <div>
                        <span class="sensor-label">X: </span>
                        <span id="accel-x">--</span>
                    </div>
                    <div>
                        <span class="sensor-label">Y: </span>
                        <span id="accel-y">--</span>
                    </div>
                    <div>
                        <span class="sensor-label">Z: </span>
                        <span id="accel-z">--</span>
                    </div>
                </div>
            </div>

            <!-- Location -->
            <div class="card">
                <div class="card-title">
                    📍 Location
                    <button class="refresh-btn" onclick="loadLocation()">Refresh</button>
                </div>
                <div class="location-info">
                    <div style="font-size: 1.5em; margin-bottom: 10px;">
                        <span id="location-lat">--</span>, <span id="location-lon">--</span>
                    </div>
                    <div class="sensor-label" id="location-accuracy">Accuracy: --</div>
                </div>
            </div>

            <!-- Events -->
            <div class="card" style="grid-column: span 2;">
                <div class="card-title">
                    📋 Recent Events
                    <button class="refresh-btn" onclick="loadEvents()">Refresh</button>
                </div>
                <div class="events-list" id="events-list">
                    <div style="padding: 20px; text-align: center; color: #94a3b8;">
                        Loading events...
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="connection-status" id="connection-status">
        Connecting...
    </div>

    <script>
        const socket = io();
        const batteryData = [];
        const lightData = [];
        const MAX_DATA_POINTS = 50;

        // Charts
        let batteryChart, lightChart;

        function initCharts() {
            // Battery Chart
            const batteryCtx = document.getElementById('batteryChart').getContext('2d');
            batteryChart = new Chart(batteryCtx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label: 'Battery %',
                        data: [],
                        borderColor: '#22c55e',
                        backgroundColor: 'rgba(34, 197, 94, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { min: 0, max: 100, grid: { color: '#334155' } },
                        x: { grid: { color: '#334155' } }
                    },
                    plugins: { legend: { display: false } }
                }
            });

            // Light Chart
            const lightCtx = document.getElementById('lightChart').getContext('2d');
            lightChart = new Chart(lightCtx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label: 'Light (lux)',
                        data: [],
                        borderColor: '#fbbf24',
                        backgroundColor: 'rgba(251, 191, 36, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { min: 0, grid: { color: '#334155' } },
                        x: { grid: { color: '#334155' } }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }

        function updateChart(chart, value) {
            const now = new Date().toLocaleTimeString();
            chart.data.labels.push(now);
            chart.data.datasets[0].data.push(value);

            if (chart.data.labels.length > MAX_DATA_POINTS) {
                chart.data.labels.shift();
                chart.data.datasets[0].data.shift();
            }

            chart.update('none');
        }

        // Socket events
        socket.on('connect', () => {
            console.log('Connected to dashboard');
            document.getElementById('connection-status').textContent = 'Connected';
            document.getElementById('connection-status').className = 'connection-status connected';
        });

        socket.on('disconnect', () => {
            console.log('Disconnected from dashboard');
            document.getElementById('connection-status').textContent = 'Disconnected';
            document.getElementById('connection-status').className = 'connection-status disconnected';
        });

        socket.on('battery_update', (data) => {
            document.getElementById('battery-percent').textContent = data.percentage + '%';
            document.getElementById('battery-status').textContent = data.status;

            // Update color based on level
            const percentEl = document.getElementById('battery-percent');
            if (data.percentage < 20) {
                percentEl.style.color = '#ef4444';
            } else if (data.percentage < 50) {
                percentEl.style.color = '#fbbf24';
            } else {
                percentEl.style.color = '#22c55e';
            }

            updateChart(batteryChart, data.percentage);
        });

        socket.on('light_update', (data) => {
            document.getElementById('light-value').textContent = data.value.toFixed(1);
            updateChart(lightChart, data.value);
        });

        socket.on('accelerometer_update', (data) => {
            if (data.values && data.values.length >= 3) {
                document.getElementById('accel-x').textContent = data.values[0].toFixed(2);
                document.getElementById('accel-y').textContent = data.values[1].toFixed(2);
                document.getElementById('accel-z').textContent = data.values[2].toFixed(2);
                document.getElementById('accel-value').textContent =
                    Math.sqrt(data.values[0]**2 + data.values[1]**2 + data.values[2]**2).toFixed(2);
            }
        });

        // API calls
        async function loadBattery() {
            try {
                const response = await fetch('/api/battery');
                const data = await response.json();

                if (data.percentage !== undefined) {
                    document.getElementById('battery-percent').textContent = data.percentage + '%';
                    document.getElementById('battery-status').textContent = data.status;
                }
            } catch (error) {
                console.error('Error loading battery:', error);
            }
        }

        async function loadLocation() {
            try {
                const response = await fetch('/api/location/latest');
                const data = await response.json();

                if (data.latitude !== undefined) {
                    document.getElementById('location-lat').textContent = data.latitude.toFixed(6);
                    document.getElementById('location-lon').textContent = data.longitude.toFixed(6);
                    document.getElementById('location-accuracy').textContent = 'Accuracy: ±' + data.accuracy + 'm';
                }
            } catch (error) {
                console.error('Error loading location:', error);
            }
        }

        async function loadEvents() {
            try {
                const response = await fetch('/api/events?hours=24');
                const events = await response.json();

                const eventsList = document.getElementById('events-list');

                if (events.length === 0) {
                    eventsList.innerHTML = '<div style="padding: 20px; text-align: center; color: #94a3b8;">No events yet</div>';
                    return;
                }

                eventsList.innerHTML = events.map(event => `
                    <div class="event-item">
                        <div><strong>${event.type}</strong>: ${event.description}</div>
                        <div class="event-time">${new Date(event.timestamp).toLocaleString()}</div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error loading events:', error);
            }
        }

        async function loadDashboardData() {
            try {
                const response = await fetch('/api/dashboard');
                const data = await response.json();

                // Update all elements
                if (data.battery) {
                    document.getElementById('battery-percent').textContent = data.battery.percentage + '%';
                    document.getElementById('battery-status').textContent = data.battery.status;
                }

                if (data.location) {
                    document.getElementById('location-lat').textContent = data.location.latitude.toFixed(6);
                    document.getElementById('location-lon').textContent = data.location.longitude.toFixed(6);
                }

                if (data.sensors.light) {
                    document.getElementById('light-value').textContent = data.sensors.light.value.toFixed(1);
                }

                if (data.sensors.accelerometer) {
                    const values = data.sensors.accelerometer.values;
                    if (values && values.length >= 3) {
                        document.getElementById('accel-x').textContent = values[0].toFixed(2);
                        document.getElementById('accel-y').textContent = values[1].toFixed(2);
                        document.getElementById('accel-z').textContent = values[2].toFixed(2);
                    }
                }

                document.getElementById('status').textContent = 'Live';
            } catch (error) {
                console.error('Error loading dashboard:', error);
                document.getElementById('status').textContent = 'Error';
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            initCharts();
            loadDashboardData();
            loadLocation();
            loadEvents();

            // Refresh dashboard data every 30 seconds
            setInterval(loadDashboardData, 30000);
        });
    </script>
</body>
</html>
